name: Version Probe (throwaway)

# Manually-triggered exploration: which Elixir/OTP versions can this project
# actually build + test on? Every leg is continue-on-error, so the run is always
# green overall — read the per-leg results in the Actions UI to find the floor,
# then set mix.exs `elixir:` accordingly and DELETE this workflow.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    name: Probe (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    continue-on-error: true
    # Relax mix.exs's `elixir:` requirement so Mix actually runs on older
    # versions — otherwise it refuses before we learn if the code/deps build.
    env:
      AMARULA_ELIXIR_REQ: ">= 1.14.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { elixir: "1.20", otp: "28" }
          - { elixir: "1.19", otp: "28" }
          - { elixir: "1.18", otp: "27" }
          - { elixir: "1.17", otp: "27" }
          - { elixir: "1.16", otp: "26" }
          - { elixir: "1.15", otp: "26" }
          - { elixir: "1.14", otp: "25" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      # No cache, no warnings-as-errors, no format/credo — we only want the raw
      # answer: do deps resolve, does it compile, do tests pass on this version?
      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test
